name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # No test suite yet — this at least catches syntax errors before a
      # deploy. Replace with pytest once the agent grows tests.
      - name: Syntax check
        run: python -m compileall agent.py
